<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>国旗 暗記カード ― FIFAワールドカップ2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b1d24; --ink2:#102a34; --panel:#0e242d; --line:#21424d;
    --paper:#eef4f3; --muted:#7f9aa3; --gold:#e7b53c; --mint:#4fd6bd; --red:#e06a6a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--paper);
    background:
      radial-gradient(1100px 560px at 82% -12%, #14323d 0%, transparent 60%),
      radial-gradient(900px 520px at -12% 6%, #103039 0%, transparent 55%),
      linear-gradient(180deg,#0b1d24 0%, #081519 100%);
    background-attachment:fixed;min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  main{max-width:560px;margin:0 auto;padding:clamp(20px,5vw,40px) clamp(16px,4vw,28px) 48px;}
  .hidden{display:none !important;}

  /* shared bits */
  .flag-box{aspect-ratio:3/2;background:#07171c;border-radius:8px;position:relative;overflow:hidden;
    border:1px solid rgba(255,255,255,.14);box-shadow:0 2px 8px rgba(0,0,0,.35);}
  .flag{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;}
  .fb{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:var(--muted);letter-spacing:.06em;}
  .noimg .flag{display:none;} .noimg .fb{display:flex;}
  .badge{font:700 10px/1 'Inter';letter-spacing:.07em;padding:4px 7px;border-radius:6px;display:inline-block;}
  .badge.host{color:#3a2c06;background:var(--gold);} .badge.debut{color:#06302a;background:var(--mint);}

  .btn{appearance:none;border:none;cursor:pointer;border-radius:999px;padding:14px 20px;
    font:700 15px/1 'Inter';transition:transform .12s ease,opacity .12s ease,background .12s;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--gold);color:#2a2006;}
  .btn.mint{background:var(--mint);color:#06302a;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn.block{width:100%;}
  .btn.sm{padding:9px 14px;font-size:13px;}

  /* ---------- setup ---------- */
  .eyebrow{display:flex;align-items:center;gap:9px;font:600 11px/1.4 'Inter';letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(231,181,60,.16);}
  h1{font-family:'Anton',sans-serif;font-size:clamp(34px,9vw,52px);line-height:.92;margin-top:12px;letter-spacing:.005em;}
  .sub{color:var(--muted);font-size:14px;margin-top:8px;}
  .label{font:700 11px/1 'Inter';letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:30px 0 12px;}

  .modes{display:grid;gap:10px;}
  .mode{display:flex;align-items:center;gap:14px;text-align:left;width:100%;
    border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:15px 16px;cursor:pointer;
    transition:border-color .15s,background .15s;}
  .mode .mtxt{flex:1;}
  .mode .mt{font:700 16px/1.2 'Inter';}
  .mode .ms{font:400 12.5px/1.3 'Inter';color:var(--muted);margin-top:3px;}
  .mode .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none;transition:.15s;}
  .mode.sel{border-color:var(--gold);background:var(--ink2);}
  .mode.sel .radio{border-color:var(--gold);background:radial-gradient(circle at center,var(--gold) 0 5px,transparent 6px);}

  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--paper);border-radius:999px;
    padding:8px 13px;font:600 13px/1 'Inter';cursor:pointer;transition:.15s;}
  .chip small{opacity:.6;margin-left:5px;font-family:'Space Mono',monospace;font-weight:400;}
  .chip.sel{background:var(--gold);color:#2a2006;border-color:var(--gold);}
  .chip.sel small{opacity:.7;}
  .start-wrap{margin-top:30px;}

  /* ---------- study ---------- */
  .topbar{display:flex;align-items:center;gap:11px;margin-bottom:20px;}
  .progress{flex:1;height:7px;background:#13313b;border-radius:999px;overflow:hidden;}
  .progress > i{display:block;height:100%;width:0;background:var(--gold);transition:width .3s ease;}
  .counter{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);white-space:nowrap;}
  .scorepill{font:700 13px/1 'Inter';color:var(--mint);white-space:nowrap;}
  .endbtn{appearance:none;background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:7px 12px;font:600 12px/1 'Inter';cursor:pointer;}

  #stage{margin-bottom:18px;}
  @media (prefers-reduced-motion:no-preference){
    #stage > *{animation:pop .28s ease;}
    @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99);}to{opacity:1;transform:none;}}
  }

  /* flip card */
  .flip{perspective:1200px;}
  .flip-inner{position:relative;width:100%;aspect-ratio:5/6;transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);cursor:pointer;}
  .flip.is-flipped .flip-inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:20px;border:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:26px;text-align:center;}
  .face.back{transform:rotateY(180deg);gap:14px;}
  .face .qhint{font:600 12px/1 'Inter';letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .face .flag-box:not(.ans-flag){width:100%;max-width:300px;}
  .tap-hint{font:500 12px/1 'Inter';color:var(--muted);opacity:.8;}
  .ans-name{font-family:'Anton',sans-serif;font-size:clamp(24px,7vw,48px);line-height:1.1;
    word-break:break-word;overflow-wrap:break-word;max-width:100%;}
  .ans-region{font:600 13px/1 'Inter';color:var(--muted);letter-spacing:.04em;}
  .face .ans-flag{width:128px;height:85.33px;flex:none;max-width:none;}
  .ans-badges{display:flex;gap:6px;}

  /* prompt card (quiz) */
  .prompt{border:1px solid var(--line);background:var(--panel);border-radius:20px;padding:24px;
    display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
  .prompt .flag-box{width:100%;max-width:300px;}
  .prompt .qhint{font:600 12px/1 'Inter';letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .prompt .pname{font-family:'Anton',sans-serif;font-size:clamp(28px,8.5vw,46px);line-height:1.05;}

  /* options */
  .opts{display:grid;gap:10px;}
  .opts.flags{grid-template-columns:1fr 1fr;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--paper);border-radius:13px;
    padding:12px 13px;font:600 clamp(13px,3.2vw,15px)/1.3 'Inter';transition:transform .1s,border-color .12s,background .12s;
    word-break:break-word;overflow-wrap:break-word;min-height:44px;}
  .opt:active{transform:scale(.99);}
  .opt .key{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:3px 7px;flex:none;}
  .opt.flag{flex-direction:column;align-items:stretch;gap:0;padding:7px;}
  .opt.flag .flag-box{width:100%;}
  .opt.correct{border-color:var(--mint);background:rgba(79,214,189,.15);}
  .opt.wrong{border-color:var(--red);background:rgba(224,106,106,.15);}
  .opt[disabled]{cursor:default;}

  #controls{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .grade-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* ---------- result ---------- */
  .res-card{border:1px solid var(--line);background:var(--panel);border-radius:20px;padding:26px;text-align:center;}
  .res-score{font-family:'Anton',sans-serif;font-size:clamp(48px,16vw,82px);line-height:.9;color:var(--gold);}
  .res-score small{font-family:'Anton';font-size:.42em;color:var(--paper);opacity:.55;}
  .res-meta{display:flex;justify-content:center;gap:22px;margin-top:14px;flex-wrap:wrap;}
  .res-meta div{font:400 12px/1.4 'Inter';color:var(--muted);}
  .res-meta b{display:block;font:700 18px/1 'Inter';color:var(--paper);margin-bottom:3px;font-family:'Space Mono',monospace;}
  .res-msg{margin-top:14px;font:600 15px/1.4 'Inter';}
  .missed-label{font:700 11px/1 'Inter';letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;}
  .missed{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
  .mini{border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:7px;display:flex;flex-direction:column;gap:7px;}
  .mini .mname{font:600 12px/1.2 'Inter';}
  .res-actions{margin-top:28px;display:flex;flex-direction:column;gap:10px;}

  footer{margin-top:36px;font:400 11.5px/1.6 'Inter';color:var(--muted);text-align:center;}
</style>
</head>
<body>
<main>

  <!-- ============ SETUP ============ -->
  <section id="setup">
    <p class="eyebrow"><span class="dot"></span>FIFA World Cup 2026 · 48 nations</p>
    <h1>国旗 暗記カード</h1>
    <p class="sub">ワールドカップ2026の出場48カ国を、カードでサクッと覚えよう。</p>

    <p class="label">モードを選ぶ</p>
    <div class="modes" id="modes">
      <button class="mode sel" data-mode="flip">
        <span class="mtxt"><span class="mt">めくって覚える</span><span class="ms">国旗を見て国名を思い出し、めくって答え合わせ</span></span>
        <span class="radio"></span>
      </button>
      <button class="mode" data-mode="mc-fwd">
        <span class="mtxt"><span class="mt">国旗 → 国名</span><span class="ms">4つの選択肢から正しい国名を当てる</span></span>
        <span class="radio"></span>
      </button>
      <button class="mode" data-mode="mc-rev">
        <span class="mtxt"><span class="mt">国名 → 国旗</span><span class="ms">4つの国旗から正しいものを選ぶ</span></span>
        <span class="radio"></span>
      </button>
    </div>

    <p class="label">範囲を選ぶ</p>
    <div class="chips" id="chips"></div>

    <div class="start-wrap">
      <button class="btn primary block" id="startBtn">スタート</button>
    </div>

    <footer>国旗データ：2026 FIFAワールドカップ 出場48カ国。金＝開催国／ミント＝初出場。</footer>
  </section>

  <!-- ============ STUDY ============ -->
  <section id="study" class="hidden">
    <div class="topbar">
      <button class="endbtn" id="endBtn">やめる</button>
      <div class="progress"><i id="bar"></i></div>
      <span class="counter" id="counter">0 / 0</span>
      <span class="scorepill" id="score">✓ 0</span>
    </div>
    <div id="stage"></div>
    <div id="controls"></div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="result" class="hidden">
    <div class="res-card">
      <div class="res-score" id="resScore">0<small>/0</small></div>
      <div class="res-meta">
        <div><b id="resAcc">0%</b>正答率</div>
        <div><b id="resStreak">0</b>最大連続正解</div>
        <div><b id="resTotal">0</b>カード</div>
      </div>
      <p class="res-msg" id="resMsg"></p>
    </div>
    <div id="missedWrap" class="hidden">
      <p class="missed-label" id="missedLabel">復習したい国</p>
      <div class="missed" id="missed"></div>
    </div>
    <div class="res-actions" id="resActions"></div>
  </section>

</main>

<script>
  /* ---------------- data ---------------- */
  const RAW = [
    {abbr:'UEFA', region:'ヨーロッパ', teams:[
      {n:'スペイン',c:'es',fb:'ESP'},{n:'フランス',c:'fr',fb:'FRA'},{n:'イングランド',c:'gb-eng',fb:'ENG'},
      {n:'ドイツ',c:'de',fb:'GER'},{n:'ポルトガル',c:'pt',fb:'POR'},{n:'オランダ',c:'nl',fb:'NED'},
      {n:'クロアチア',c:'hr',fb:'CRO'},{n:'ベルギー',c:'be',fb:'BEL'},{n:'スイス',c:'ch',fb:'SUI'},
      {n:'オーストリア',c:'at',fb:'AUT'},{n:'ノルウェー',c:'no',fb:'NOR'},{n:'スコットランド',c:'gb-sct',fb:'SCO'},
      {n:'スウェーデン',c:'se',fb:'SWE'},{n:'チェコ',c:'cz',fb:'CZE'},{n:'トルコ',c:'tr',fb:'TUR'},
      {n:'ボスニア・ヘルツェゴビナ',c:'ba',fb:'BIH'},
    ]},
    {abbr:'CAF', region:'アフリカ', teams:[
      {n:'モロッコ',c:'ma',fb:'MAR'},{n:'セネガル',c:'sn',fb:'SEN'},{n:'エジプト',c:'eg',fb:'EGY'},
      {n:'アルジェリア',c:'dz',fb:'ALG'},{n:'チュニジア',c:'tn',fb:'TUN'},{n:'コートジボワール',c:'ci',fb:'CIV'},
      {n:'ガーナ',c:'gh',fb:'GHA'},{n:'南アフリカ',c:'za',fb:'RSA'},{n:'コンゴ民主共和国',c:'cd',fb:'COD'},
      {n:'カーボベルデ',c:'cv',fb:'CPV',debut:true},
    ]},
    {abbr:'AFC', region:'アジア', teams:[
      {n:'日本',c:'jp',fb:'JPN'},{n:'韓国',c:'kr',fb:'KOR'},{n:'イラン',c:'ir',fb:'IRN'},
      {n:'オーストラリア',c:'au',fb:'AUS'},{n:'サウジアラビア',c:'sa',fb:'KSA'},{n:'カタール',c:'qa',fb:'QAT'},
      {n:'イラク',c:'iq',fb:'IRQ'},{n:'ヨルダン',c:'jo',fb:'JOR',debut:true},{n:'ウズベキスタン',c:'uz',fb:'UZB',debut:true},
    ]},
    {abbr:'CONCACAF', region:'北中米・カリブ', teams:[
      {n:'メキシコ',c:'mx',fb:'MEX',host:true},{n:'アメリカ',c:'us',fb:'USA',host:true},{n:'カナダ',c:'ca',fb:'CAN',host:true},
      {n:'パナマ',c:'pa',fb:'PAN'},{n:'ハイチ',c:'ht',fb:'HAI'},{n:'キュラソー',c:'cw',fb:'CUR',debut:true},
    ]},
    {abbr:'CONMEBOL', region:'南米', teams:[
      {n:'アルゼンチン',c:'ar',fb:'ARG'},{n:'ブラジル',c:'br',fb:'BRA'},{n:'ウルグアイ',c:'uy',fb:'URU'},
      {n:'コロンビア',c:'co',fb:'COL'},{n:'エクアドル',c:'ec',fb:'ECU'},{n:'パラグアイ',c:'py',fb:'PAR'},
    ]},
    {abbr:'OFC', region:'オセアニア', teams:[
      {n:'ニュージーランド',c:'nz',fb:'NZL'},
    ]},
  ];
  const ALL = [];
  RAW.forEach(g => g.teams.forEach(t => ALL.push(Object.assign({}, t, {conf:g.abbr, region:g.region}))));

  const flagURL = c => 'https://flagcdn.com/' + c + '.svg';
  const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

  function flagBox(card, extra){
    const box = document.createElement('div'); box.className = 'flag-box' + (extra?(' '+extra):'');
    const img = document.createElement('img'); img.className='flag'; img.src=flagURL(card.c);
    img.alt=card.n+'の国旗'; img.loading='lazy';
    img.addEventListener('error', ()=>box.classList.add('noimg'));
    const fb = document.createElement('span'); fb.className='fb'; fb.textContent=card.fb;
    box.append(img, fb); return box;
  }
  function badgesEl(card){
    const wrap = document.createElement('div'); wrap.className='ans-badges';
    if(card.host){const b=document.createElement('span');b.className='badge host';b.textContent='開催国';wrap.appendChild(b);}
    if(card.debut){const b=document.createElement('span');b.className='badge debut';b.textContent='初出場';wrap.appendChild(b);}
    return wrap;
  }

  /* ---------------- elements ---------------- */
  const $ = id => document.getElementById(id);
  const setupEl=$('setup'), studyEl=$('study'), resultEl=$('result');
  const stage=$('stage'), controls=$('controls');
  const bar=$('bar'), counter=$('counter'), scoreEl=$('score');

  /* ---------------- settings ui ---------------- */
  let mode='flip', range='ALL';

  document.querySelectorAll('.mode').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.mode').forEach(m=>m.classList.remove('sel'));
      btn.classList.add('sel'); mode=btn.dataset.mode;
    });
  });

  const chipsEl=$('chips');
  const ranges=[{k:'ALL',label:'全48カ国',n:48}].concat(RAW.map(g=>({k:g.abbr,label:g.abbr,n:g.teams.length})));
  ranges.forEach((r,idx)=>{
    const c=document.createElement('button'); c.className='chip'+(idx===0?' sel':'');
    c.innerHTML = r.label + '<small>'+r.n+'</small>'; c.dataset.k=r.k;
    c.addEventListener('click',()=>{
      chipsEl.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel'); range=r.k;
    });
    chipsEl.appendChild(c);
  });

  $('startBtn').addEventListener('click',()=>startRound(buildDeck(range)));
  $('endBtn').addEventListener('click', showResult);

  /* ---------------- session state ---------------- */
  let deck=[], i=0, round=null, current=null;
  let revealed=false, answered=false, currentOptions=[], pendingNext=null;

  function buildDeck(r){
    const sel = r==='ALL' ? ALL.slice() : ALL.filter(c=>c.conf===r);
    return shuffle(sel.slice());
  }

  function startRound(d){
    deck=d; i=0;
    round={correct:0,total:d.length,missed:[],streak:0,best:0};
    setupEl.classList.add('hidden'); resultEl.classList.add('hidden'); studyEl.classList.remove('hidden');
    renderCard();
  }

  function updateTop(){
    bar.style.width = (round.total? ((i+1)/round.total*100):0) + '%';
    counter.textContent = Math.min(i+1, round.total) + ' / ' + round.total;
    scoreEl.textContent = '✓ ' + round.correct;
  }

  function record(ok){
    if(ok){ round.correct++; round.streak++; round.best=Math.max(round.best,round.streak); }
    else { round.missed.push(current); round.streak=0; }
  }
  function advance(){
    i++;
    if(i>=deck.length){ showResult(); return; }
    renderCard();
  }

  /* ---------------- render a card ---------------- */
  function renderCard(){
    current=deck[i]; revealed=false; answered=false; currentOptions=[]; pendingNext=null;
    updateTop();
    stage.innerHTML=''; controls.innerHTML='';
    if(mode==='flip') renderFlip();
    else renderQuiz();
  }

  function renderFlip(){
    const flip=document.createElement('div'); flip.className='flip';
    const inner=document.createElement('div'); inner.className='flip-inner';

    const front=document.createElement('div'); front.className='face front';
    const fh=document.createElement('div'); fh.className='qhint'; fh.textContent='この国旗は？';
    front.append(fh, flagBox(current));
    const th=document.createElement('div'); th.className='tap-hint'; th.textContent='タップしてめくる';
    front.append(th);

    const back=document.createElement('div'); back.className='face back';
    const name=document.createElement('div'); name.className='ans-name'; name.textContent=current.n;
    const reg=document.createElement('div'); reg.className='ans-region'; reg.textContent=current.conf+' ・ '+current.region;
    back.append(flagBox(current,'ans-flag'), name, reg);
    if(current.host||current.debut) back.append(badgesEl(current));

    inner.append(front, back); flip.appendChild(inner);
    inner.addEventListener('click', toggleFlip);
    stage.appendChild(flip);
    stage._flip=flip;

    const flipBtn=document.createElement('button'); flipBtn.className='btn primary block'; flipBtn.textContent='めくる';
    flipBtn.addEventListener('click', toggleFlip);
    controls.appendChild(flipBtn);
  }

  function toggleFlip(){
    const flip=stage._flip; if(!flip) return;
    flip.classList.toggle('is-flipped');
    if(!revealed && flip.classList.contains('is-flipped')){
      revealed=true; showGradeButtons();
    }
  }
  function showGradeButtons(){
    controls.innerHTML='';
    const row=document.createElement('div'); row.className='grade-row';
    const no=document.createElement('button'); no.className='btn ghost'; no.textContent='あやふや';
    const yes=document.createElement('button'); yes.className='btn mint'; yes.textContent='覚えてた';
    no.addEventListener('click',()=>grade(false));
    yes.addEventListener('click',()=>grade(true));
    row.append(no,yes); controls.appendChild(row);
  }
  function grade(ok){ if(!revealed) return; record(ok); advance(); }

  /* ---------------- quiz modes ---------------- */
  function pickOptions(answer){
    const others=shuffle(ALL.filter(c=>c.n!==answer.n)).slice(0,3);
    return shuffle(others.concat([answer]));
  }

  function renderQuiz(){
    const fwd = (mode==='mc-fwd'); // flag -> name
    const prompt=document.createElement('div'); prompt.className='prompt';
    const qh=document.createElement('div'); qh.className='qhint';
    if(fwd){
      qh.textContent='この国は？';
      prompt.append(qh, flagBox(current));
    } else {
      qh.textContent='この国の国旗は？';
      const pn=document.createElement('div'); pn.className='pname'; pn.textContent=current.n;
      prompt.append(qh, pn);
    }
    stage.appendChild(prompt);

    const opts=pickOptions(current);
    const grid=document.createElement('div'); grid.className='opts'+(fwd?'':' flags');
    opts.forEach((opt,idx)=>{
      const b=document.createElement('button'); b.className='opt'+(fwd?'':' flag'); b.type='button';
      if(fwd){
        const k=document.createElement('span'); k.className='key'; k.textContent=(idx+1);
        const t=document.createElement('span'); t.textContent=opt.n;
        b.append(k,t);
      } else {
        b.appendChild(flagBox(opt));
      }
      b.addEventListener('click',()=>chooseOption(opt,b));
      currentOptions.push({card:opt, el:b});
      grid.appendChild(b);
    });
    controls.appendChild(grid);
  }

  function chooseOption(chosen, el){
    if(answered) return; answered=true;
    const ok = chosen.n===current.n;
    currentOptions.forEach(o=>{
      o.el.setAttribute('disabled','');
      if(o.card.n===current.n) o.el.classList.add('correct');
    });
    if(!ok) el.classList.add('wrong');
    record(ok);
    updateTop();
    if(ok){
      setTimeout(advance, 650);
    } else {
      const nx=document.createElement('button'); nx.className='btn primary block'; nx.textContent='次へ ›';
      nx.addEventListener('click', advance);
      controls.appendChild(nx);
      pendingNext=advance;
    }
  }

  /* ---------------- result ---------------- */
  function showResult(){
    studyEl.classList.add('hidden'); setupEl.classList.add('hidden'); resultEl.classList.remove('hidden');
    const total=round.total, correct=round.correct;
    const acc = total? Math.round(correct/total*100):0;
    $('resScore').innerHTML = correct + '<small>/'+total+'</small>';
    $('resAcc').textContent = acc+'%';
    $('resStreak').textContent = round.best;
    $('resTotal').textContent = total;

    const msg=$('resMsg');
    if(round.missed.length===0) msg.textContent = 'パーフェクト！全部正解です。';
    else if(acc>=80) msg.textContent = 'いい調子！あと少しで全制覇。';
    else if(acc>=50) msg.textContent = 'その調子。間違えた国を重点的にどうぞ。';
    else msg.textContent = 'まずは間違えた国から覚えていこう。';

    const mw=$('missedWrap'), mEl=$('missed'); mEl.innerHTML='';
    if(round.missed.length){
      mw.classList.remove('hidden');
      $('missedLabel').textContent = '復習したい国（'+round.missed.length+'）';
      round.missed.forEach(card=>{
        const m=document.createElement('div'); m.className='mini';
        const nm=document.createElement('span'); nm.className='mname'; nm.textContent=card.n;
        m.append(flagBox(card), nm); mEl.appendChild(m);
      });
    } else { mw.classList.add('hidden'); }

    const acts=$('resActions'); acts.innerHTML='';
    if(round.missed.length){
      const retry=document.createElement('button'); retry.className='btn mint block';
      retry.textContent='間違えた国だけ復習（'+round.missed.length+'）';
      const missedCopy=round.missed.slice();
      retry.addEventListener('click',()=>startRound(shuffle(missedCopy)));
      acts.appendChild(retry);
    }
    const again=document.createElement('button'); again.className='btn primary block'; again.textContent='同じ範囲でもう一回';
    again.addEventListener('click',()=>startRound(buildDeck(range)));
    acts.appendChild(again);

    const home=document.createElement('button'); home.className='btn ghost block'; home.textContent='メニューに戻る';
    home.addEventListener('click',()=>{ resultEl.classList.add('hidden'); setupEl.classList.remove('hidden'); });
    acts.appendChild(home);
  }

  /* ---------------- keyboard ---------------- */
  document.addEventListener('keydown',(e)=>{
    if(studyEl.classList.contains('hidden')) return;
    if(mode==='flip'){
      if(e.key===' '){ e.preventDefault(); toggleFlip(); }
      else if(revealed && (e.key==='1'||e.key==='ArrowRight'||e.key==='Enter')){ e.preventDefault(); grade(true); }
      else if(revealed && (e.key==='2'||e.key==='ArrowLeft')){ e.preventDefault(); grade(false); }
    } else {
      if(!answered && /^[1-4]$/.test(e.key)){
        const idx=+e.key-1; if(currentOptions[idx]) currentOptions[idx].el.click();
      } else if(answered && (e.key==='Enter'||e.key===' ')){
        e.preventDefault(); if(pendingNext) pendingNext(); else advance();
      }
    }
  });
</script>
</body>
</html>
